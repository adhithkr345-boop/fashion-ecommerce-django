<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier | Luxury Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

<style>
:root {
  --accent-gold: #d4af37;
  --glass: rgba(15, 15, 15, 0.85);
  --border: rgba(255, 255, 255, 0.12);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body {
  background: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
  background-size: cover;
  color:#fff;
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 100%);
  z-index: -1;
}

/* NAVBAR */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background: var(--glass);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-style: italic;
  color: var(--accent-gold);
  letter-spacing: 1px;
}

.nav-links {display:flex; gap:30px; list-style:none;}
.nav-links a {
    color:white; 
    text-decoration:none; 
    font-size: 12px; 
    text-transform: uppercase; 
    letter-spacing: 2px;
    transition: 0.3s;
}
.nav-links a:hover { color: var(--accent-gold); }

.cart-icon {
  position:relative;
  text-decoration: none;
  font-size: 1.2rem;
}

.cart-icon span {
  position:absolute;
  top:-10px;
  right:-12px;
  background: var(--accent-gold);
  color: #000;
  font-size:10px;
  font-weight: 700;
  padding: 2px 5px;
  border-radius: 50%;
}

/* HERO */
.hero {
  height:70vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position: relative;
}

.hero-content {
    background: rgba(0,0,0,0.4);
    padding: 40px;
    backdrop-filter: blur(5px);
    border: 1px solid var(--border);
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-style: italic;
    margin-bottom: 10px;
}

.hero p {
    letter-spacing: 4px;
    text-transform: uppercase;
    font-size: 14px;
    margin-bottom: 20px;
    color: #ccc;
}

.btn-shop {
  padding: 12px 35px;
  background: var(--accent-gold);
  border: none;
  color: #000;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor:pointer;
  transition: 0.4s;
}

.btn-shop:hover {
  background: #fff;
  letter-spacing: 4px;
}

/* BACK BUTTON */
.back-nav {
    padding: 20px 60px 0;
}
.back-link {
    text-decoration: none;
    color: #fff;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.6;
}

/* PRODUCTS SECTION */
.section { padding: 80px 60px; }
.section-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    margin-bottom: 40px;
    text-align: center;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:40px;
}

.card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow:hidden;
  transition: 0.4s;
  display: flex;
  flex-direction: column;
}

.card:hover { transform: translateY(-10px); border-color: var(--accent-gold); }

.card img {
  width:100%;
  height:350px;
  object-fit:cover;
}

.card-body { 
    padding: 25px; 
    flex-grow: 1; 
    display: flex; 
    flex-direction: column; 
}

.card-body h4 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    margin-bottom: 5px;
}

.category {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 10px;
}

.price { 
    color: var(--accent-gold); 
    font-size: 1.2rem;
    margin-bottom: 20px;
    margin-top: auto;
}

.add-btn {
  width:100%;
  padding: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: white;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 11px;
  cursor:pointer;
  transition: 0.3s;
}

.add-btn:hover {
  background: white;
  color: black;
}

</style>
</head>

<body>

<nav>
  <div class="logo">Atelier</div>

  <ul class="nav-links">
    <li><a href="#">The House</a></li>
    <li><a href="/allproduct/">Collection</a></li>
    <li><a href="#">Stores</a></li>
  </ul>

  <a href="{% url 'view_cart' %}" class="cart-icon">
    🛒 <span id="cart-count">0</span>
  </a>
</nav>

<div class="back-nav">
    <a href="javascript:history.back()" class="back-link">← Return</a>
</div>

<section class="hero">
  <div class="hero-content">
    <p>Spring / Summer 2026</p>
    <h1>Refined Elegance</h1>
    <button class="btn-shop" onclick="window.location.href='/allproduct/'">Explore Collection</button>
  </div>
</section>

<section class="section">
  <h2 class="section-title">New Arrivals</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=1287&auto=format&fit=crop">
      <div class="card-body">
        <span class="category">Evening Wear</span>
        <h4>Velvet Noir Gown</h4>
        <p class="price">₹12,999</p>
        <button class="add-btn" onclick="addToCart('Velvet Noir Gown', 12999)">Add to Collection</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1320&auto=format&fit=crop">
      <div class="card-body">
        <span class="category">Seasonal</span>
        <h4>Silk Flow Sundress</h4>
        <p class="price">₹8,499</p>
        <button class="add-btn" onclick="addToCart('Silk Flow Sundress', 8499)">Add to Collection</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=1173&auto=format&fit=crop">
      <div class="card-body">
        <span class="category">Couture</span>
        <h4>Ivory Satin Piece</h4>
        <p class="price">₹15,000</p>
        <button class="add-btn" onclick="addToCart('Ivory Satin Piece', 15000)">Add to Collection</button>
      </div>
    </div>

  </div>
</section>

<script>
// Simple Logic to sync with your current setup
let cartCount = 0;

function addToCart(name, price){
  cartCount++;
  document.getElementById("cart-count").innerText = cartCount;
  
  // Optional: Visual feedback
  alert(name + " added to your collection.");
}
</script>

</body>
</html>
