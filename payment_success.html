<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: 'Poppins', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: linear-gradient(180deg, #4facfe, #00f2fe);
            padding: 20px;
            color: white;
        }

        .sidebar h3 {
            font-weight: bold;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Main Content */
        .content {
            padding: 30px;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4facfe;
        }

        .btn-primary {
            background: #4facfe;
            border: none;
        }

        .btn-primary:hover {
            background: #00c6ff;
        }

        .dark-mode {
            background: #1e1e2f;
            color: white;
        }

        .dark-mode .card {
            background: #2c2c3e;
            color: white;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 sidebar">
            <h3>✈️ TravelApp</h3>

            <a href="#"><i class="fas fa-user"></i> Profile</a>
            <a href="#"><i class="fas fa-map"></i> My Trips</a>
            <a href="#"><i class="fas fa-book"></i> Bookings</a>
            <a href="#"><i class="fas fa-cog"></i> Settings</a>

            <hr>

            <button onclick="toggleDarkMode()" class="btn btn-light w-100">🌙 Dark Mode</button>
        </div>

        <!-- Content -->
        <div class="col-md-9 content">

            <div class="card p-4">
                <h4 class="mb-4">Edit Profile</h4>

                <div class="row">
                    <!-- Profile Image -->
                    <div class="col-md-4 text-center">
                        {% if user.image %}
                            <img src="{{ user.image.url }}" class="profile-img mb-3" id="preview">
                        {% else %}
                            <img src="https://via.placeholder.com/150" class="profile-img mb-3" id="preview">
                        {% endif %}

                        <input type="file" name="image" form="profileForm" class="form-control" onchange="previewImage(event)">
                    </div>

                    <!-- Form -->
                    <div class="col-md-8">
                        <form method="POST" enctype="multipart/form-data" id="profileForm">
                            {% csrf_token %}

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>Name</label>
                                    <input type="text" name="name" value="{{ user.name }}" class="form-control">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Email</label>
                                    <input type="email" name="email" value="{{ user.email }}" class="form-control">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Phone</label>
                                    <input type="number" name="phone" value="{{ user.phone }}" class="form-control">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Age</label>
                                    <input type="number" name="age" value="{{ user.age }}" class="form-control">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Password</label>
                                    <input type="password" name="password" value="{{ user.password }}" class="form-control">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label>Gender</label>
                                    <select name="gender" class="form-control">
                                        <option value="">Select</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                    </select>
                                </div>

                                <div class="col-12 mb-3">
                                    <label>Address</label>
                                    <textarea name="address" class="form-control">{{ user.address }}</textarea>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Update Profile
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById('preview').src = reader.result;
    };
    reader.readAsDataURL(event.target.files[0]);
}

function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
