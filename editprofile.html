<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier | Archive New Piece</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

<style>
:root {
  --accent-gold: #d4af37;
  --gold-gradient: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #d4af37 100%);
  --glass: rgba(10, 10, 10, 0.9);
  --border-gold: rgba(212, 175, 55, 0.25);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    min-height: 100vh;
    background: 
        radial-gradient(circle, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.9) 100%),
        url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2070') center/cover no-repeat fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

/* BACK NAVIGATION */
.back-nav {
  position: absolute;
  top: 40px;
  left: 40px;
}

.back-link {
  text-decoration: none;
  color: #fff;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 3px;
  opacity: 0.5;
  transition: 0.3s;
}

.back-link:hover { opacity: 1; color: var(--accent-gold); }

/* CONTAINER */
.container {
    width: 100%;
    max-width: 450px;
    padding: 50px 40px;
    background: var(--glass);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--border-gold);
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    animation: fadeIn 1.2s cubic-bezier(0.19, 1, 0.22, 1);
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.brand {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 5px;
  margin-bottom: 5px;
}

h2 {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.2rem;
    color: #888;
    margin-bottom: 40px;
    letter-spacing: 1px;
}

/* FORM GROUPS */
.form-group {
    position: relative;
    margin-bottom: 25px;
}

input, select {
    width: 100%;
    padding: 12px 0;
    border: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    outline: none;
    background: transparent;
    color: #fff;
    font-size: 14px;
    transition: 0.4s;
}

select {
    cursor: pointer;
    color: #888;
}

select option {
    background: #111;
    color: #fff;
}

/* FLOATING LABELS FOR TEXT INPUTS */
.form-group label {
    position: absolute;
    top: 12px;
    left: 0;
    color: #555;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: 0.4s;
    pointer-events: none;
}

input:focus, select:focus {
    border-bottom: 1px solid var(--accent-gold);
}

/* Label Animation */
input:focus + label, 
input:valid + label {
    top: -12px;
    font-size: 9px;
    color: var(--accent-gold);
}

/* FILE INPUT CUSTOMIZATION */
.file-box {
    margin-top: 10px;
    padding: 15px 0;
    border-top: 1px solid rgba(255,255,255,0.05);
}

.file-box span {
    display: block;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-gold);
    margin-bottom: 10px;
}

input[type="file"] {
    border: none;
    font-size: 11px;
    color: #666;
}

/* SUBMIT BUTTON */
.btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--accent-gold);
    color: var(--accent-gold);
    text-transform: uppercase;
    letter-spacing: 4px;
    font-weight: 500;
    font-size: 11px;
    cursor: pointer;
    transition: 0.5s;
    margin-top: 20px;
}

.btn:hover {
    background: var(--accent-gold);
    color: #000;
    box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
}

/* Placeholder fix for selects without floating labels */
.select-label {
    position: relative !important;
    top: -5px !important;
    display: block;
    font-size: 9px;
    color: var(--accent-gold);
    letter-spacing: 2px;
}

</style>
</head>

<body>

<div class="back-nav">
    <a href="javascript:history.back()" class="back-link">← Return to Collection</a>
</div>

<div class="container">
    <div class="brand">ATELIER</div>
    <h2>Archive New Piece</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <input type="text" name="productname" required>
            <label>Product Designation</label>
        </div>

        <div class="form-group">
            <span class="select-label">Category Curation</span>
            <select name="category" required>
                <option value="" disabled selected>Select Genre</option>
                <option>Electronics</option>
                <option>Clothing</option>
                <option>Food</option>
            </select>
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;">
                <input type="text" name="quantity" required>
                <label>Inventory Count</label>
            </div>
            <div class="form-group" style="flex: 1;">
                <input type="text" name="price" required>
                <label>Valuation (₹)</label>
            </div>
        </div>

        <div class="file-box">
            <span>Visual Asset</span>
            <input type="file" name="image" required>
        </div>

        <button class="btn">Add to Collection</button>
    </form>
</div>

</body>
</html>
