<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier | Member Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

<style>
:root {
  --accent-gold: #d4af37;
  --gold-gradient: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #d4af37 100%);
  --glass: rgba(10, 10, 10, 0.85);
  --border-gold: rgba(212, 175, 55, 0.25);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* CINEMATIC LUXURY BACKGROUND */
body {
  height: 100vh;
  background: 
    radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%),
    url("https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* BACK BUTTON */
.back-nav {
  position: absolute;
  top: 40px;
  left: 40px;
}

.back-link {
  text-decoration: none;
  color: #fff;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 3px;
  opacity: 0.5;
  transition: 0.3s;
}

.back-link:hover {
  opacity: 1;
  color: var(--accent-gold);
}

/* LOGIN CONTAINER */
.container {
  width: 380px;
  background: var(--glass);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  padding: 60px 40px;
  border: 1px solid var(--border-gold);
  box-shadow: 0 40px 100px rgba(0,0,0,0.9);
  color: white;
  text-align: center;
  animation: fadeInDown 1.2s cubic-bezier(0.19, 1, 0.22, 1);
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* BRANDING */
.brand {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 700;
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 5px;
  margin-bottom: 10px;
}

.container h2 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.1rem;
  margin-bottom: 40px;
  color: #888;
  letter-spacing: 1px;
}

/* FORM STYLING */
.input-box {
  margin-bottom: 30px;
  position: relative;
}

.input-box input {
  width: 100%;
  padding: 10px 0;
  border: none;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  outline: none;
  background: transparent;
  color: white;
  font-size: 14px;
  transition: 0.4s;
}

.input-box input:focus {
  border-bottom: 1px solid var(--accent-gold);
}

.input-box input::placeholder {
  color: #444;
  text-transform: uppercase;
  font-size: 9px;
  letter-spacing: 2.5px;
}

/* LUXURY BUTTON */
.btn {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid var(--accent-gold);
  color: var(--accent-gold);
  text-transform: uppercase;
  letter-spacing: 4px;
  font-weight: 500;
  font-size: 11px;
  cursor: pointer;
  transition: 0.5s;
  margin-top: 10px;
}

.btn:hover {
  background: var(--accent-gold);
  color: #000;
  box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
}

/* LINKS */
.links {
  display: flex;
  justify-content: space-between;
  margin-top: 35px;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.links a {
  color: #666;
  text-decoration: none;
  transition: 0.3s;
}

.links a:hover {
  color: white;
}

.signup-link {
    color: var(--accent-gold) !important;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="back-nav">
    <a href="/" class="back-link">← The House</a>
</div>

<div class="container">

  <div class="brand">ATELIER</div>
  <h2>Member Login</h2>

  <form method="POST">
    {% csrf_token %}

    <div class="input-box">
      <input type="email" name="email" placeholder="Identity / Email" required>
    </div>

    <div class="input-box">
      <input type="password" name="password" placeholder="Key / Password" required>
    </div>

    <button type="submit" class="btn">Enter The Atelier</button>
  </form>

  <div class="links">
    <a href="#">Forgot Key?</a>
    <a href="/register/" class="signup-link">Apply for Membership</a>
  </div>

</div>

</body>
</html>
